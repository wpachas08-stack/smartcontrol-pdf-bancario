services:
  - type: web
    name: smartcontrol-pdf-bancario
    env: python
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: API_KEY
        generateValue: false
        value: smartcontrol_2026_secret_CAMBIA_ESTO
    healthCheckPath: /
