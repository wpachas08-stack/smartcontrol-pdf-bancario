services:
  - type: web
    name: smartcontrol-pdf-bancario
    env: python
    region: oregon
    plan: free
    buildCommand: apt-get update -qq && apt-get install -y -qq qpdf && pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: API_KEY
        value: sc_pdf_2026_smartcontrol
    healthCheckPath: /
